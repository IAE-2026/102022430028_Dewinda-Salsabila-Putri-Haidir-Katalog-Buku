services:

  catalog-service:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8002:8000"
    environment:
      APP_NAME: catalog-service
      APP_KEY: "base64:rJWoC0kSefDin88c4a9PCM7OX92NJFX4uFfAlGA1dGM="
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8002
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: katalog_buku
      DB_USERNAME: root
      DB_PASSWORD: root
      IAE_API_KEY: "102022430028"
      IAE_TEAM_ID: "TEAM-05"
      SSO_EMAIL: "warga05@ktp.iae.id"
      SSO_PASSWORD: "KtpDigital2026!"
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: katalog_buku
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - catalog-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  catalog-db-data: